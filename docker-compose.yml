services:
  api:
    build:
      context: ./apps/api
    container_name: adadd-api
    restart: unless-stopped

    depends_on:
      - mysql

    environment:
      APP_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: adadd
      DB_PASSWORD: adadd_password
      DB_NAME: adadd

    ports:
      - "8080:8080"

  mysql:
    image: mysql:8.4
    container_name: adadd-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: adadd
      MYSQL_USER: adadd
      MYSQL_PASSWORD: adadd_password
      MYSQL_ROOT_PASSWORD: root_password

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data: