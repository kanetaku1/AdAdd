services:
  mysql:
    image: mysql:8.4
    container_name: adadd-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: adadd
      MYSQL_USER: adadd
      MYSQL_PASSWORD: adadd_password
      MYSQL_ROOT_PASSWORD: root_password

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data: