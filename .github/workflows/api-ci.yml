name: api-ci

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main, frontend, backend]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

defaults:
  run:
    working-directory: apps/api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/api/go.sum

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -v
