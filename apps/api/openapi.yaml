openapi: 3.0.3
info:
  title: AdAdd API
  version: "1.0.0"
  description: OpenAPI 仕様（簡易版）。フロントエンド実装用に主要エンドポイントとスキーマを記載。
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /years/{yearId}/companies:
    post:
      summary: YearlyCompany 作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YearlyCompanyInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YearlyCompany'
  /yearly-companies/{id}/assignments:
    post:
      summary: CompanyAssignment を置換またはクリア（userId null でクリア）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  nullable: true
                role:
                  type: string
      responses:
        '201':
          description: Assigned
        '200':
          description: Cleared
  /yearly-companies/{id}/contract:
    get:
      summary: 契約を取得
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: SponsorshipContract 作成（progress を CONFIRMED に更新、assigneeId は CompanyAssignment から設定）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorshipContract'
        '409':
          description: Conflict (duplicate contract for YearlyCompany)
  /contracts/{contractId}:
    patch:
      summary: 契約を更新（totalAmount / assigneeId はサーバ管理のため更新不可）
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /contracts/{contractId}/menus:
    get:
      summary: 契約メニューの一覧を取得
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: 契約メニューを追加（親契約の totalAmount を再計算）
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractMenuInput'
      responses:
        '201':
          description: Created
  /contract-menus/{id}:
    delete:
      summary: 契約メニューを削除（親契約の totalAmount を再計算）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
  /contract-menus/{id}/status:
    patch:
      summary: 契約メニューのステータス更新
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        '200':
          description: Updated
  /contracts/{contractId}/payment:
    post:
      summary: 支払い作成（totalAmount > 0 の契約に対して明示的に作成）
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
        '409':
          description: Conflict
  /payments/{paymentId}:
    patch:
      summary: 支払いステータス更新
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated
  /advisor-assignments:
    get:
      summary: Year の AdvisorAssignment 一覧
      parameters:
        - name: yearId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: AdvisorAssignment を追加（同一 Year+Member+Advisor は 409）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                yearId:
                  type: string
                advisorUserId:
                  type: string
                memberUserId:
                  type: string
              required: [yearId, advisorUserId, memberUserId]
      responses:
        '201':
          description: Created
        '409':
          description: Conflict
  /advisor-assignments/{id}:
    delete:
      summary: AdvisorAssignment を削除
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
components:
  schemas:
    YearlyCompanyInput:
      type: object
      properties:
        companyId:
          type: string
      required: [companyId]
    YearlyCompany:
      type: object
      properties:
        id:
          type: string
        yearId:
          type: string
        companyId:
          type: string
        companyStatus:
          type: string
        phase:
          type: string
        progress:
          type: string
        createdAt:
          type: string
          format: date-time
    ContractInput:
      type: object
      properties:
        contractDate:
          type: string
          format: date
        totalAmount:
          type: number
        remarks:
          type: string
    SponsorshipContract:
      type: object
      properties:
        id:
          type: string
        yearlyCompanyId:
          type: string
        totalAmount:
          type: number
        assigneeId:
          type: string
        remarks:
          type: string
        createdAt:
          type: string
          format: date-time
    ContractMenuInput:
      type: object
      properties:
        sponsorshipMenuId:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        isGoodsSponsorship:
          type: boolean
      required: [sponsorshipMenuId, quantity]
    Payment:
      type: object
      properties:
        id:
          type: string
        contractId:
          type: string
        amount:
          type: number
        status:
          type: string
        confirmedAt:
          type: string
          format: date-time
